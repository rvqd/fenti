<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fenti</title>

  <link rel="icon" href="fentiwebsiteiconupdated.png" type="image/png">

  <style>
    @font-face {
      font-family: 'OCR A Extended';
      src: url('ocraextended.ttf') format('truetype');
    }

    :root {
      --accent: #ff4fd8;
      --accent-soft: rgba(255, 121, 198, 0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'OCR A Extended', monospace;
      color: white;
      text-align: center;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(1200px 800px at 20% 10%, #1a1a40 0%, #070716 40%, #000 100%);
    }

    body::before, body::after {
      content: "";
      position: absolute;
      inset: -50%;
      background-repeat: repeat;
      z-index: 0;
    }

    body::before {
      background-image:
        radial-gradient(1px 1px at 10% 20%, #fff, transparent 60%),
        radial-gradient(1px 1px at 30% 70%, #fff, transparent 60%),
        radial-gradient(1px 1px at 80% 40%, #fff, transparent 60%),
        radial-gradient(1px 1px at 60% 90%, #fff, transparent 60%);
      background-size: 200px 200px;
      animation: driftSlow 160s linear infinite;
    }

    body::after {
      background-image:
        radial-gradient(2px 2px at 20% 30%, #fff, transparent 60%),
        radial-gradient(2px 2px at 70% 60%, #fff, transparent 60%);
      background-size: 300px 300px;
      animation: driftFast 90s linear infinite;
    }

    @keyframes driftSlow {
      from { transform: translate3d(0,0,0); }
      to { transform: translate3d(-300px,-300px,0); }
    }

    @keyframes driftFast {
      from { transform: translate3d(0,0,0); }
      to { transform: translate3d(-600px,-600px,0); }
    }

    .container {
      position: relative;
      z-index: 1;
      top: 50%;
      transform: translateY(-50%);
    }

    h1 {
      font-size: 4rem;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent);
    }

    .socials {
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
      margin-top: 30px;
    }

    .socials a {
      width: 220px;
      padding: 14px;
      text-decoration: none;
      color: white;
      border: 1px solid white;
      border-radius: 30px;
      transition: 0.3s;
    }

    .socials a:hover {
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Fenti</h1>

  <div class="socials">
    <a data-social="youtube" href="#">YouTube</a>
    <a data-social="discord" href="#">Discord</a>

    <!-- NEW BUTTON -->
    <a href="script.html">Script</a>
  </div>
</div>

<script>
  const socials = {
    youtube: "https://www.youtube.com/@nexxcaaa",
    discord: "https://discord.gg/cvmAC3GEk8"
  };

  document.querySelectorAll('.socials a').forEach(link => {
    const key = link.dataset.social;
    if (socials[key]) {
      link.href = socials[key];
      link.target = "_blank";
    }
  });
</script>

</body>
</html>
