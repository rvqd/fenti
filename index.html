<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fenti</title>

  <style>
    @font-face {
      font-family: 'OCR A Extended';
      src: url('ocraextended.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    :root {
      --accent: #ff4fd8;
      --accent-soft: rgba(255, 121, 198, 0.25);
    }
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'OCR A Extended', monospace;
      color: white;
      text-align: center;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(1200px 800px at 20% 10%, #1a1a40 0%, #070716 40%, #000 100%);
    }

    body::before, body::after {
      content: "";
      position: absolute;
      inset: -50%;
      background-repeat: repeat;
      z-index: 0;
    }
    body::before {
      background-image:
        radial-gradient(1px 1px at 10% 20%, #fff, transparent 60%),
        radial-gradient(1px 1px at 30% 70%, #fff, transparent 60%),
        radial-gradient(1px 1px at 80% 40%, #fff, transparent 60%),
        radial-gradient(1px 1px at 60% 90%, #fff, transparent 60%),
        radial-gradient(1px 1px at 50% 10%, #fff, transparent 60%);
      background-size: 200px 200px;
      animation: driftSlow 160s linear infinite;
      opacity: 0.7;
    }
    body::after {
      background-image:
        radial-gradient(2px 2px at 20% 30%, #fff, transparent 60%),
        radial-gradient(2px 2px at 70% 60%, #fff, transparent 60%),
        radial-gradient(1.5px 1.5px at 40% 80%, #fff, transparent 60%);
      background-size: 300px 300px;
      animation: driftFast 90s linear infinite;
      opacity: 0.9;
    }

    @keyframes driftSlow {
      from { transform: translate3d(0,0,0); }
      to { transform: translate3d(-300px,-300px,0); }
    }
    @keyframes driftFast {
      from { transform: translate3d(0,0,0); }
      to { transform: translate3d(-600px,-600px,0); }
    }

    .nebula {
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(600px 400px at 80% 20%, rgba(123, 31, 162, 0.2), transparent 60%),
        radial-gradient(700px 500px at 10% 80%, rgba(0, 188, 212, 0.2), transparent 60%),
        radial-gradient(500px 400px at 50% 50%, rgba(255, 64, 129, 0.1), transparent 60%);
      filter: blur(18px);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      top: 50%;
      transform: translateY(-50%);
      padding: 20px;
    }

    h1 {
      font-size: clamp(3rem, 6vw, 5rem);
      margin: 0 0 25px;
      letter-spacing: 2px;
      font-weight: 400;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow:
        0 0 5px var(--accent),
        0 0 12px var(--accent-soft);
    }

    .divider {
      width: 120px;
      height: 2px;
      margin: 0 auto 25px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      box-shadow: 0 0 8px var(--accent);
    }

    .socials {
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }

    .socials a {
      display: inline-block;
      width: 220px;
      padding: 14px 20px;
      text-decoration: none;
      color: white;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 30px;
      backdrop-filter: blur(6px);
      background: rgba(255,255,255,0.05);
      letter-spacing: 2px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .socials a::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .socials a:hover {
      transform: translateY(-3px) scale(1.03);
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--accent-soft);
    }
    .socials a:hover::before { opacity: 1; }

    footer {
      position: absolute;
      bottom: 15px;
      width: 100%;
      font-size: 0.8rem;
      opacity: 0.5;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="nebula"></div>

  <div class="container">
    <h1>Fenti</h1>
    <div class="divider"></div>

    <div class="socials">
      <a data-social="youtube" href="#">YouTube</a>
      <a data-social="discord" href="#">Discord</a>
    </div>
  </div>

  <footer>© Fenti</footer>

  <script>
    // 👇 Define your social links here
    const socials = {
      youtube: "https://www.youtube.com/@nexxcaaa",
      discord: "https://discord.gg/cvmAC3GEk8",
      twitter: "https://twitter.com/yourhandle",
      instagram: "https://instagram.com/yourhandle"
    };

    // Update all social links dynamically
    document.querySelectorAll('.socials a').forEach(link => {
      const key = link.dataset.social;
      if (socials[key]) {
        link.href = socials[key];
        link.target = "_blank"; // open in new tab
      }
    });
  </script>
</body>
</html>
